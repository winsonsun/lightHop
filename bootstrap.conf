# ==========================================
# ss-tproxy Node Bootstrap Configuration
# ==========================================

# --- Core Proxy Settings (Shadowsocks) ---
SS_SERVER="YOUR_SS_SERVER_IP"
SS_PORT="8388"
SS_PASSWORD="your_secure_password"
SS_METHOD="aes-256-gcm"

# --- Local Bindings ---
LOCAL_PROXY_PORT="10299"
DNSCRYPT_LISTEN="127.0.0.1:5310"

# --- Subnet Routing ---
# Define the internal subnets that SHOULD be transparently proxied.
# External subnets and foreign VLANs will automatically bypass the proxy.
PROXY_SUBNETS=(
    "10.10.6.0/24"
)

# --- GitHub Proxy Mirror ---
# Used during bootstrapping to bypass GFW when downloading binaries and lists
GH_MIRROR="https://ghproxy.net/https://github.com"
RAW_MIRROR="https://ghproxy.net/https://raw.githubusercontent.com"
